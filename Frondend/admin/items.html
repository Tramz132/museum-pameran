<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Koleksi Barang - MUSEUMEXPO</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex">

    <!-- Sidebar Container -->
    <div id="sidebar-container" class="w-64 bg-slate-900 text-white min-h-screen flex-shrink-0 hidden md:block"></div>

    <!-- Main Content Area -->
    <div class="flex-grow flex flex-col min-h-screen">
        <!-- Top Navbar -->
        <div id="navbar-container"></div>

        <!-- Inner Content -->
        <main class="p-6 md:p-8 flex-grow">
            <!-- Header section -->
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Kelola Koleksi Barang</h1>
                    <p class="text-sm text-slate-400 mt-1 font-medium">Tambah, edit, hapus, dan atur ketersediaan barang museum.</p>
                </div>
                <div>
                    <button onclick="openAddModal()" class="px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-2xl shadow-lg shadow-blue-600/10 hover:shadow-blue-600/20 transition-all duration-200 flex items-center gap-2">
                        <span>➕</span> Tambah Barang
                    </button>
                </div>
            </div>

            <!-- Filter Card -->
            <div class="bg-white border border-slate-100 p-6 rounded-3xl mb-8 flex flex-col md:flex-row gap-4 items-center justify-between shadow-sm">
                <div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
                    <!-- Search Input -->
                    <div class="relative w-full md:w-80">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </span>
                        <input type="text" id="search-input" oninput="debounceSearch()"
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" 
                               placeholder="Cari nama barang, kode, kategori...">
                    </div>
                    <!-- Status Filter -->
                    <div class="w-full md:w-48">
                        <select id="status-filter" onchange="fetchItems(1)"
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200 text-slate-600">
                            <option value="">Semua Status</option>
                            <option value="Tersedia">Tersedia</option>
                            <option value="Dipinjam">Dipinjam</option>
                            <option value="Perbaikan">Perbaikan</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-sm">
                <div class="overflow-x-auto w-full">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 bg-slate-50/50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <th class="py-4 px-6 w-20">Foto</th>
                                <th class="py-4 px-6">Detail Barang</th>
                                <th class="py-4 px-6">Identitas Koleksi</th>
                                <th class="py-4 px-6 text-center">Status</th>
                                <th class="py-4 px-6 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="items-tbody" class="divide-y divide-slate-100 text-xs font-semibold text-slate-600">
                            <tr>
                                <td colspan="5" class="py-12 text-center text-slate-400">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Container -->
                <div class="flex justify-between items-center bg-slate-50/20 border-t border-slate-100 px-6 py-4" id="pagination-container">
                    <!-- Dynamic Pagination -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Item Modal -->
    <div id="item-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-xl w-full shadow-2xl p-6 md:p-8 animate-in fade-in zoom-in duration-200 max-h-[90vh] overflow-y-auto">
            <!-- Modal Header -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                <h3 class="text-lg font-bold text-slate-800" id="modal-title">Tambah Koleksi Barang</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <!-- Error Alert -->
            <div id="modal-error" class="hidden bg-rose-50 border border-rose-100 text-rose-700 px-4 py-3 rounded-2xl text-xs mb-4"></div>

            <!-- Modal Form -->
            <form id="item-form" class="space-y-4" enctype="multipart/form-data">
                <input type="hidden" id="modal-item-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="kode_barang" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Kode Barang (Unik)</label>
                        <input type="text" id="kode_barang" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="BARANG-001">
                    </div>
                    <div>
                        <label for="nama_barang" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Nama Barang</label>
                        <input type="text" id="nama_barang" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Arca Ganesha Emas">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="kategori" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Kategori</label>
                        <input type="text" id="kategori" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Arkeologi">
                    </div>
                    <div>
                        <label for="status" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Status</label>
                        <select id="status" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200 text-slate-600">
                            <option value="Tersedia">Tersedia</option>
                            <option value="Dipinjam">Dipinjam</option>
                            <option value="Perbaikan">Perbaikan</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="asal" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Asal / Asosiasi</label>
                        <input type="text" id="asal" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Jawa Tengah">
                    </div>
                    <div>
                        <label for="tahun" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Tahun / Abad</label>
                        <input type="text" id="tahun" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Abad ke-9 Masehi">
                    </div>
                </div>

                <div>
                    <label for="deskripsi" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Deskripsi Koleksi</label>
                    <textarea id="deskripsi" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" rows="3" placeholder="Tuliskan deskripsi lengkap atau riwayat penemuan barang..."></textarea>
                </div>

                <div>
                    <label for="foto" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Foto Barang</label>
                    <input type="file" id="foto" accept="image/*" class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200 text-slate-500">
                    <p class="text-[10px] text-slate-400 mt-1">*Kosongkan jika tidak ingin mengubah foto (saat mengedit).</p>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="w-1/2 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl text-xs transition-all duration-200">Batal</button>
                    <button type="submit" id="modal-submit-btn" class="w-1/2 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 text-xs transition-all duration-200">Simpan Barang</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts Configuration -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        requireAuth(['admin']);
        injectLayout();

        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                fetchItems(1);
            }, 300);
        }

        async function fetchItems(page = 1) {
            const search = document.getElementById('search-input').value;
            const status = document.getElementById('status-filter').value;
            const tbody = document.getElementById('items-tbody');
            
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="py-8 text-center text-slate-450 animate-pulse">Memuat data barang museum...</td>
                </tr>
            `;

            try {
                const response = await apiFetch(`/admin/museum-items?page=${page}&search=${search}&status=${status}`);
                if (!response) return;

                const data = await response.json();
                renderItems(data.data);
                renderPagination(data);
            } catch (error) {
                console.error(error);
            }
        }

        function renderItems(items) {
            const tbody = document.getElementById('items-tbody');
            if (items.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-12 text-center text-slate-400">
                            <span class="text-3xl">📦</span>
                            <h4 class="text-sm font-bold text-slate-600 mt-2">Koleksi Kosong</h4>
                            <p class="text-xs text-slate-450 mt-1">Belum ada barang museum yang terdaftar.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = items.map(item => {
                const badgeColor = item.status === 'Tersedia' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' :
                                   item.status === 'Dipinjam' ? 'bg-blue-50 text-blue-700 border border-blue-100' :
                                   'bg-amber-50 text-amber-700 border border-amber-100';

                const imageSrc = item.foto ? `${STORAGE_URL}/${item.foto}` : 'https://placehold.co/100x100/f1f5f9/94a3b8?text=No+Photo';

                return `
                    <tr class="hover:bg-slate-50/50 transition-all duration-200">
                        <td class="py-4 px-6">
                            <img src="${imageSrc}" class="w-12 h-12 object-cover rounded-xl border border-slate-100 shadow-sm" alt="${item.nama_barang}">
                        </td>
                        <td class="py-4 px-6">
                            <span class="text-[10px] text-slate-400 block">${item.kode_barang}</span>
                            <span class="font-bold text-slate-800 text-sm">${item.nama_barang}</span>
                        </td>
                        <td class="py-4 px-6">
                            <span class="font-bold text-slate-700">${item.kategori}</span>
                            <span class="text-[10px] text-slate-400 block mt-0.5">Asal: ${item.asal} (${item.tahun})</span>
                        </td>
                        <td class="py-4 px-6 text-center">
                            <span class="text-[10px] font-bold px-3 py-1.5 rounded-full ${badgeColor}">${item.status}</span>
                        </td>
                        <td class="py-4 px-6">
                            <div class="flex gap-2 justify-center">
                                <button onclick="openEditModal(${item.id})" class="px-3.5 py-2 bg-slate-100 hover:bg-blue-50 hover:text-blue-600 text-slate-600 rounded-xl text-[10px] font-bold transition-all duration-200">Edit</button>
                                <button onclick="deleteItem(${item.id})" class="px-3.5 py-2 bg-slate-100 hover:bg-rose-50 hover:text-rose-600 text-slate-600 rounded-xl text-[10px] font-bold transition-all duration-200">Hapus</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination(data) {
            const container = document.getElementById('pagination-container');
            const total = data.total;
            const from = data.from || 0;
            const to = data.to || 0;
            const currentPage = data.current_page;
            const lastPage = data.last_page;

            let prevBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-450 rounded-xl text-xs font-bold cursor-not-allowed">Sebelumnya</button>`;
            if (currentPage > 1) {
                prevBtn = `<button onclick="fetchItems(${currentPage - 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Sebelumnya</button>`;
            }

            let nextBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-455 rounded-xl text-xs font-bold cursor-not-allowed">Selanjutnya</button>`;
            if (currentPage < lastPage) {
                nextBtn = `<button onclick="fetchItems(${currentPage + 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Selanjutnya</button>`;
            }

            container.innerHTML = `
                <span class="text-xs font-semibold text-slate-400">Menampilkan ${from}-${to} dari ${total} barang</span>
                <div class="flex gap-2">
                    ${prevBtn}
                    ${nextBtn}
                </div>
            `;
        }

        // Modal Controls
        function openAddModal() {
            document.getElementById('modal-item-id').value = '';
            document.getElementById('modal-title').textContent = 'Tambah Koleksi Barang';
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('item-form').reset();
            document.getElementById('item-modal').classList.remove('hidden');
        }

        async function openEditModal(itemId) {
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('item-form').reset();
            
            try {
                const response = await apiFetch(`/admin/museum-items/${itemId}`);
                if (!response) return;

                const item = await response.json();
                
                document.getElementById('modal-item-id').value = item.id;
                document.getElementById('kode_barang').value = item.kode_barang;
                document.getElementById('nama_barang').value = item.nama_barang;
                document.getElementById('kategori').value = item.kategori;
                document.getElementById('status').value = item.status;
                document.getElementById('asal').value = item.asal;
                document.getElementById('tahun').value = item.tahun;
                document.getElementById('deskripsi').value = item.deskripsi;
                
                document.getElementById('modal-title').textContent = 'Edit Koleksi Barang';
                document.getElementById('item-modal').classList.remove('hidden');

            } catch (error) {
                console.error(error);
            }
        }

        function closeModal() {
            document.getElementById('item-modal').classList.add('hidden');
        }

        // Submit form (Add / Edit)
        document.getElementById('item-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const itemId = document.getElementById('modal-item-id').value;
            const submitBtn = document.getElementById('modal-submit-btn');
            const errorAlert = document.getElementById('modal-error');

            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Menyimpan...';

            // Gunakan FormData untuk multipart (file upload)
            const formData = new FormData();
            formData.append('kode_barang', document.getElementById('kode_barang').value);
            formData.append('nama_barang', document.getElementById('nama_barang').value);
            formData.append('kategori', document.getElementById('kategori').value);
            formData.append('status', document.getElementById('status').value);
            formData.append('asal', document.getElementById('asal').value);
            formData.append('tahun', document.getElementById('tahun').value);
            formData.append('deskripsi', document.getElementById('deskripsi').value);
            
            const fotoFile = document.getElementById('foto').files[0];
            if (fotoFile) {
                formData.append('foto', fotoFile);
            }

            let endpoint = '/admin/museum-items';
            let options = {
                method: 'POST',
                body: formData
            };

            // Jika mengedit, gunakan spoofing PUT method Laravel
            if (itemId) {
                endpoint = `/admin/museum-items/${itemId}`;
                formData.append('_method', 'PUT'); // Trick parsing files via PUT di PHP/Laravel API
            }

            try {
                const response = await apiFetch(endpoint, options);
                if (!response) return;

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Gagal menyimpan barang.');
                }

                alert(data.message || 'Barang museum berhasil disimpan!');
                closeModal();
                fetchItems(1);

            } catch (error) {
                errorAlert.textContent = error.message;
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Simpan Barang';
            }
        });

        // Delete Item
        async function deleteItem(itemId) {
            if (!confirm('Apakah Anda yakin ingin menghapus barang koleksi museum ini? Tindakan ini tidak bisa dibatalkan.')) {
                return;
            }

            try {
                const response = await apiFetch(`/admin/museum-items/${itemId}`, {
                    method: 'DELETE'
                });

                if (!response) return;
                const data = await response.json();
                
                alert(data.message || 'Barang berhasil dihapus!');
                fetchItems(1);
            } catch (error) {
                console.error(error);
            }
        }

        // Initial Load
        fetchItems(1);
    </script>
</body>
</html>
