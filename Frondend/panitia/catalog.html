<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Koleksi Museum - MUSEUMEXPO</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex">

    <!-- Sidebar Container -->
    <div id="sidebar-container" class="w-64 bg-slate-900 text-white min-h-screen flex-shrink-0 hidden md:block"></div>

    <!-- Main Content Area -->
    <div class="flex-grow flex flex-col min-h-screen">
        <!-- Top Navbar -->
        <div id="navbar-container"></div>

        <!-- Inner Content -->
        <main class="p-6 md:p-8 flex-grow">
            <!-- Header section -->
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Katalog Koleksi Museum</h1>
                    <p class="text-sm text-slate-400 mt-1 font-medium">Cari dan ajukan peminjaman barang koleksi untuk pameran luar.</p>
                </div>
            </div>

            <!-- Filter Card -->
            <div class="bg-white border border-slate-100 p-6 rounded-3xl mb-8 flex flex-col md:flex-row gap-4 items-center justify-between shadow-sm">
                <div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
                    <!-- Search Input -->
                    <div class="relative w-full md:w-80">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </span>
                        <input type="text" id="search-input" oninput="debounceSearch()"
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" 
                               placeholder="Cari barang, asal, atau kategori...">
                    </div>
                    <!-- Status Filter -->
                    <div class="w-full md:w-48">
                        <select id="status-filter" onchange="fetchCatalog(1)"
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200 text-slate-600">
                            <option value="">Semua Status</option>
                            <option value="Tersedia">Tersedia</option>
                            <option value="Dipinjam">Dipinjam</option>
                            <option value="Perbaikan">Perbaikan</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Catalog Items Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8" id="catalog-grid">
                <!-- Skeletons load here -->
            </div>

            <!-- Pagination Container -->
            <div class="flex justify-between items-center bg-white border border-slate-100 px-6 py-4 rounded-2xl shadow-sm" id="pagination-container">
                <!-- Dynamic Pagination info & buttons -->
            </div>
        </main>
    </div>

    <!-- Loan Request Modal -->
    <div id="loan-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full shadow-2xl p-6 md:p-8 animate-in fade-in zoom-in duration-200">
            <!-- Modal Header -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                <h3 class="text-lg font-bold text-slate-800">Form Pengajuan Peminjaman</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <!-- Error Alert -->
            <div id="modal-error" class="hidden bg-rose-50 border border-rose-100 text-rose-700 px-4 py-3 rounded-2xl text-xs mb-4"></div>

            <!-- Modal Form -->
            <form id="loan-form" class="space-y-4">
                <input type="hidden" id="modal-item-id">
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Nama Barang</label>
                    <input type="text" id="modal-item-name" disabled class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-semibold text-slate-500">
                </div>

                <div>
                    <label for="nama_acara" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Nama Kegiatan / Pameran</label>
                    <input type="text" id="nama_acara" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Pameran Seni Nasional 2026">
                </div>

                <div>
                    <label for="lokasi" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Lokasi Pameran</label>
                    <input type="text" id="lokasi" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Museum Nasional Hall A">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="tanggal_mulai" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Tanggal Mulai</label>
                        <input type="date" id="tanggal_mulai" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200">
                    </div>
                    <div>
                        <label for="tanggal_selesai" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Tanggal Selesai</label>
                        <input type="date" id="tanggal_selesai" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200">
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="w-1/2 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl text-xs transition-all duration-200">Batal</button>
                    <button type="submit" id="modal-submit-btn" class="w-1/2 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 text-xs transition-all duration-200">Ajukan Sekarang</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts Configuration -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        requireAuth(['panitia']);
        injectLayout();

        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                fetchCatalog(1);
            }, 300);
        }

        // Fetch & render Catalog
        async function fetchCatalog(page = 1) {
            const search = document.getElementById('search-input').value;
            const status = document.getElementById('status-filter').value;
            const grid = document.getElementById('catalog-grid');
            
            // Set Skeletons
            grid.innerHTML = Array(4).fill(0).map(() => `
                <div class="animate-pulse bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-sm">
                    <div class="h-48 bg-slate-200"></div>
                    <div class="p-5 space-y-3">
                        <div class="h-4 bg-slate-200 rounded w-1/3"></div>
                        <div class="h-6 bg-slate-200 rounded w-3/4"></div>
                        <div class="h-4 bg-slate-200 rounded w-1/2"></div>
                    </div>
                </div>
            `).join('');

            try {
                const response = await apiFetch(`/panitia/catalog?page=${page}&search=${search}&status=${status}`);
                if (!response) return;

                const data = await response.json();
                renderCatalog(data.data);
                renderPagination(data);
            } catch (error) {
                console.error(error);
            }
        }

        function renderCatalog(items) {
            const grid = document.getElementById('catalog-grid');
            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-white border border-slate-100 text-center py-12 px-6 rounded-3xl">
                        <span class="text-4xl">🔍</span>
                        <h4 class="text-md font-bold text-slate-700 mt-4">Koleksi Tidak Ditemukan</h4>
                        <p class="text-xs text-slate-400 mt-1">Coba masukkan kata kunci pencarian yang lain.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = items.map(item => {
                const badgeColor = item.status === 'Tersedia' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' :
                                   item.status === 'Dipinjam' ? 'bg-blue-50 text-blue-700 border border-blue-100' :
                                   'bg-amber-50 text-amber-700 border border-amber-100';

                const imageSrc = item.foto ? `${STORAGE_URL}/${item.foto}` : 'https://placehold.co/600x400/f1f5f9/94a3b8?text=No+Photo';
                
                const btnHtml = item.status === 'Tersedia' 
                    ? `<button onclick="openLoanModal(${item.id}, '${item.nama_barang}')" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/10 hover:shadow-blue-600/20 text-xs transition-all duration-200">Ajukan Peminjaman</button>`
                    : `<button disabled class="w-full py-3 bg-slate-100 text-slate-400 font-bold rounded-2xl text-xs cursor-not-allowed">Tidak Tersedia</button>`;

                return `
                    <div class="bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 flex flex-col justify-between">
                        <div>
                            <!-- Image wrapper -->
                            <div class="relative h-48 bg-slate-50">
                                <img src="${imageSrc}" class="w-full h-full object-cover" alt="${item.nama_barang}">
                                <span class="absolute top-3 right-3 text-[10px] font-bold px-2.5 py-1.5 rounded-full ${badgeColor}">${item.status}</span>
                            </div>
                            <!-- Card Content -->
                            <div class="p-5">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${item.kategori}</span>
                                <h3 class="text-md font-extrabold text-slate-800 mt-1 leading-snug">${item.nama_barang}</h3>
                                <p class="text-xs text-slate-400 mt-2 font-medium">Asal: <span class="text-slate-600 font-semibold">${item.asal} (${item.tahun})</span></p>
                            </div>
                        </div>
                        <!-- Footer Button -->
                        <div class="px-5 pb-5 pt-2">
                            ${btnHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render Pagination
        function renderPagination(data) {
            const container = document.getElementById('pagination-container');
            const total = data.total;
            const from = data.from || 0;
            const to = data.to || 0;
            const currentPage = data.current_page;
            const lastPage = data.last_page;

            let prevBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-450 rounded-xl text-xs font-bold cursor-not-allowed">Sebelumnya</button>`;
            if (currentPage > 1) {
                prevBtn = `<button onclick="fetchCatalog(${currentPage - 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Sebelumnya</button>`;
            }

            let nextBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-455 rounded-xl text-xs font-bold cursor-not-allowed">Selanjutnya</button>`;
            if (currentPage < lastPage) {
                nextBtn = `<button onclick="fetchCatalog(${currentPage + 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Selanjutnya</button>`;
            }

            container.innerHTML = `
                <span class="text-xs font-semibold text-slate-400">Menampilkan ${from}-${to} dari ${total} barang</span>
                <div class="flex gap-2">
                    ${prevBtn}
                    ${nextBtn}
                </div>
            `;
        }

        // Modal Operations
        function openLoanModal(itemId, itemName) {
            document.getElementById('modal-item-id').value = itemId;
            document.getElementById('modal-item-name').value = itemName;
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('loan-form').reset();
            document.getElementById('loan-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('loan-modal').classList.add('hidden');
        }

        // Submit Form
        document.getElementById('loan-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const itemId = document.getElementById('modal-item-id').value;
            const namaAcara = document.getElementById('nama_acara').value;
            const lokasi = document.getElementById('lokasi').value;
            const tanggalMulai = document.getElementById('tanggal_mulai').value;
            const tanggalSelesai = document.getElementById('tanggal_selesai').value;
            
            const submitBtn = document.getElementById('modal-submit-btn');
            const errorAlert = document.getElementById('modal-error');

            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Memproses...';

            try {
                const response = await apiFetch('/panitia/loan-requests', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        museum_item_id: itemId,
                        nama_acara: namaAcara,
                        lokasi: lokasi,
                        tanggal_mulai: tanggalMulai,
                        tanggal_selesai: tanggalSelesai
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Gagal mengirim pengajuan.');
                }

                alert(data.message || 'Pengajuan peminjaman berhasil dikirim!');
                closeModal();
                fetchCatalog(1);

            } catch (error) {
                errorAlert.textContent = error.message;
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ajukan Sekarang';
            }
        });

        // Initial Load
        fetchCatalog(1);
    </script>
</body>
</html>
