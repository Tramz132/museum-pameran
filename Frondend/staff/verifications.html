<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Peminjaman - MUSEUMEXPO</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex">

    <!-- Sidebar Container -->
    <div id="sidebar-container" class="w-64 bg-slate-900 text-white min-h-screen flex-shrink-0 hidden md:block"></div>

    <!-- Main Content Area -->
    <div class="flex-grow flex flex-col min-h-screen">
        <!-- Top Navbar -->
        <div id="navbar-container"></div>

        <!-- Inner Content -->
        <main class="p-6 md:p-8 flex-grow">
            <!-- Header section -->
            <div class="mb-8">
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Verifikasi Peminjaman</h1>
                <p class="text-sm text-slate-400 mt-1 font-medium">Tinjau dokumen pengajuan dan setujui/tolak peminjaman barang koleksi.</p>
            </div>

            <!-- Table Card -->
            <div class="bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-sm">
                <div class="overflow-x-auto w-full">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 bg-slate-50/50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <th class="py-4 px-6">Panitia Pemohon</th>
                                <th class="py-4 px-6">Barang Koleksi</th>
                                <th class="py-4 px-6">Detail Acara & Masa Pinjam</th>
                                <th class="py-4 px-6 text-center">Status</th>
                                <th class="py-4 px-6 text-center">Aksi Verifikasi</th>
                            </tr>
                        </thead>
                        <tbody id="verifications-tbody" class="divide-y divide-slate-100 text-xs font-semibold text-slate-600">
                            <tr>
                                <td colspan="5" class="py-12 text-center text-slate-400">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Container -->
                <div class="flex justify-between items-center bg-slate-50/20 border-t border-slate-100 px-6 py-4" id="pagination-container">
                    <!-- Dynamic Pagination -->
                </div>
            </div>
        </main>
    </div>

    <!-- Verification Modal -->
    <div id="verify-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-md w-full shadow-2xl p-6 md:p-8 animate-in fade-in zoom-in duration-200">
            <!-- Modal Header -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                <h3 class="text-lg font-bold text-slate-800" id="modal-title">Persetujuan Pengajuan</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <!-- Error Alert -->
            <div id="modal-error" class="hidden bg-rose-50 border border-rose-100 text-rose-700 px-4 py-3 rounded-2xl text-xs mb-4"></div>

            <!-- Modal Form -->
            <form id="verify-form" class="space-y-4">
                <input type="hidden" id="modal-request-id">
                <input type="hidden" id="modal-status">
                
                <p class="text-slate-500 text-sm leading-relaxed" id="modal-description">Apakah Anda yakin ingin menyetujui pengajuan peminjaman barang ini?</p>

                <!-- Rejected Note input (Visible only when status is Rejected) -->
                <div id="rejection-note-container" class="hidden">
                    <label for="catatan" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Alasan / Catatan Penolakan</label>
                    <textarea id="catatan" class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" rows="3" placeholder="Contoh: Lokasi pameran tidak aman / Barang sedang dipersiapkan untuk acara lain..."></textarea>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="w-1/2 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl text-xs transition-all duration-200">Batal</button>
                    <button type="submit" id="modal-submit-btn" class="w-1/2 py-3 text-white font-bold rounded-2xl shadow-lg text-xs transition-all duration-200">Ya, Konfirmasi</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts Configuration -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        requireAuth(['staff']);
        injectLayout();

        async function fetchVerifications(page = 1) {
            const tbody = document.getElementById('verifications-tbody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="py-8 text-center text-slate-400 animate-pulse">Memuat data pengajuan...</td>
                </tr>
            `;

            try {
                const response = await apiFetch(`/staff/verifications?page=${page}`);
                if (!response) return;

                const data = await response.json();
                renderVerifications(data.data);
                renderPagination(data);
            } catch (error) {
                console.error(error);
            }
        }

        function renderVerifications(requests) {
            const tbody = document.getElementById('verifications-tbody');
            if (requests.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-12 text-center text-slate-400">
                            <span class="text-3xl">📭</span>
                            <h4 class="text-sm font-bold text-slate-600 mt-2">Tidak Ada Pengajuan</h4>
                            <p class="text-xs text-slate-450 mt-1">Saat ini belum ada pengajuan peminjaman baru masuk.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = requests.map(req => {
                const badgeColor = req.status === 'Approved' ? 'bg-blue-50 text-blue-700 border border-blue-100' :
                                   req.status === 'Rejected' ? 'bg-rose-50 text-rose-700 border border-rose-100' :
                                   'bg-amber-50 text-amber-700 border border-amber-100';

                const museumItem = req.museum_item;
                const itemCode = museumItem ? `<span class="text-[10px] text-slate-400 block">${museumItem.kode_barang}</span>` : '';
                const itemName = museumItem ? museumItem.nama_barang : 'Barang Terhapus';

                const dateMulai = new Date(req.tanggal_mulai).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                const dateSelesai = new Date(req.tanggal_selesai).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});

                let actionsHtml = `<span class="text-slate-400 italic text-[11px]">Sudah diproses</span>`;
                if (req.status === 'Pending') {
                    actionsHtml = `
                        <div class="flex gap-2 justify-center">
                            <button onclick="openVerifyModal(${req.id}, 'Approved')" class="px-3.5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-[10px] font-bold shadow-lg shadow-blue-600/10 hover:shadow-blue-600/20 transition-all duration-200">Setujui</button>
                            <button onclick="openVerifyModal(${req.id}, 'Rejected')" class="px-3.5 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-[10px] font-bold shadow-lg shadow-rose-600/10 hover:shadow-rose-600/20 transition-all duration-200">Tolak</button>
                        </div>
                    `;
                }

                return `
                    <tr class="hover:bg-slate-50/50 transition-all duration-200">
                        <td class="py-5 px-6">
                            <span class="font-bold text-slate-800 text-sm block">${req.user.name}</span>
                            <span class="text-[10px] text-slate-400 font-medium">${req.user.email}</span>
                        </td>
                        <td class="py-5 px-6">
                            ${itemCode}
                            <span class="font-bold text-slate-700">${itemName}</span>
                        </td>
                        <td class="py-5 px-6">
                            <span class="font-bold text-slate-700 block">${req.nama_acara}</span>
                            <span class="text-[10px] text-slate-400 block mb-1">Lokasi: ${req.lokasi}</span>
                            <span class="text-[10px] text-slate-500 bg-slate-100 px-2 py-1 rounded-md">${dateMulai} s/d ${dateSelesai}</span>
                        </td>
                        <td class="py-5 px-6 text-center">
                            <span class="text-[10px] font-bold px-3 py-1.5 rounded-full ${badgeColor}">${req.status}</span>
                        </td>
                        <td class="py-5 px-6">
                            ${actionsHtml}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination(data) {
            const container = document.getElementById('pagination-container');
            const total = data.total;
            const from = data.from || 0;
            const to = data.to || 0;
            const currentPage = data.current_page;
            const lastPage = data.last_page;

            let prevBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-450 rounded-xl text-xs font-bold cursor-not-allowed">Sebelumnya</button>`;
            if (currentPage > 1) {
                prevBtn = `<button onclick="fetchVerifications(${currentPage - 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Sebelumnya</button>`;
            }

            let nextBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-455 rounded-xl text-xs font-bold cursor-not-allowed">Selanjutnya</button>`;
            if (currentPage < lastPage) {
                nextBtn = `<button onclick="fetchVerifications(${currentPage + 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Selanjutnya</button>`;
            }

            container.innerHTML = `
                <span class="text-xs font-semibold text-slate-400">Menampilkan ${from}-${to} dari ${total} pengajuan</span>
                <div class="flex gap-2">
                    ${prevBtn}
                    ${nextBtn}
                </div>
            `;
        }

        // Modal Controls
        function openVerifyModal(requestId, status) {
            document.getElementById('modal-request-id').value = requestId;
            document.getElementById('modal-status').value = status;
            document.getElementById('modal-error').classList.add('hidden');
            
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-description');
            const submitBtn = document.getElementById('modal-submit-btn');
            const noteContainer = document.getElementById('rejection-note-container');
            const noteTextarea = document.getElementById('catatan');

            noteTextarea.value = '';
            
            if (status === 'Approved') {
                titleEl.textContent = 'Persetujuan Peminjaman';
                descEl.textContent = 'Apakah Anda yakin ingin menyetujui pengajuan peminjaman barang ini? Status barang akan otomatis berubah menjadi "Dipinjam".';
                noteContainer.classList.add('hidden');
                noteTextarea.required = false;
                
                submitBtn.className = 'w-1/2 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 text-xs transition-all duration-200';
            } else {
                titleEl.textContent = 'Penolakan Pengajuan';
                descEl.textContent = 'Anda menolak pengajuan peminjaman barang ini. Silakan tuliskan alasan penolakan di bawah agar dapat dibaca oleh Panitia.';
                noteContainer.classList.remove('hidden');
                noteTextarea.required = true;

                submitBtn.className = 'w-1/2 py-3 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-2xl shadow-lg shadow-rose-600/20 text-xs transition-all duration-200';
            }

            document.getElementById('verify-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('verify-modal').classList.add('hidden');
        }

        // Submit Form
        document.getElementById('verify-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const requestId = document.getElementById('modal-request-id').value;
            const status = document.getElementById('modal-status').value;
            const catatan = document.getElementById('catatan').value;
            
            const submitBtn = document.getElementById('modal-submit-btn');
            const errorAlert = document.getElementById('modal-error');

            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            const originalBtnText = submitBtn.textContent;
            submitBtn.textContent = 'Memverifikasi...';

            try {
                const response = await apiFetch(`/staff/verifications/${requestId}/verify`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status, catatan })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Gagal memproses verifikasi.');
                }

                alert(data.message || 'Verifikasi berhasil dikirim!');
                closeModal();
                fetchVerifications(1);

            } catch (error) {
                errorAlert.textContent = error.message;
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });

        // Initial Load
        fetchVerifications(1);
    </script>
</body>
</html>
