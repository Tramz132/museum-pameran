<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pengguna - MUSEUMEXPO</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex">

    <!-- Sidebar Container -->
    <div id="sidebar-container" class="w-64 bg-slate-900 text-white min-h-screen flex-shrink-0 hidden md:block"></div>

    <!-- Main Content Area -->
    <div class="flex-grow flex flex-col min-h-screen">
        <!-- Top Navbar -->
        <div id="navbar-container"></div>

        <!-- Inner Content -->
        <main class="p-6 md:p-8 flex-grow">
            <!-- Header section -->
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Kelola Pengguna</h1>
                    <p class="text-sm text-slate-400 mt-1 font-medium">Daftarkan akun admin baru, staf kurator, atau panitia pameran.</p>
                </div>
                <div>
                    <button onclick="openAddModal()" class="px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-2xl shadow-lg shadow-blue-600/10 hover:shadow-blue-600/20 transition-all duration-200 flex items-center gap-2">
                        <span>➕</span> Tambah Pengguna
                    </button>
                </div>
            </div>

            <!-- Filter Card -->
            <div class="bg-white border border-slate-100 p-6 rounded-3xl mb-8 flex flex-col md:flex-row gap-4 items-center justify-between shadow-sm">
                <div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
                    <!-- Search Input -->
                    <div class="relative w-full md:w-80">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </span>
                        <input type="text" id="search-input" oninput="debounceSearch()"
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" 
                               placeholder="Cari nama atau email pengguna...">
                    </div>
                    <!-- Role Filter -->
                    <div class="w-full md:w-48">
                        <select id="role-filter" onchange="fetchUsers(1)"
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200 text-slate-600">
                            <option value="">Semua Peran</option>
                            <option value="admin">Administrator</option>
                            <option value="staff">Staf Kurator</option>
                            <option value="panitia">Panitia Eksternal</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-sm">
                <div class="overflow-x-auto w-full">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-100 bg-slate-50/50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <th class="py-4 px-6">Nama Pengguna</th>
                                <th class="py-4 px-6">Alamat Email</th>
                                <th class="py-4 px-6 text-center">Peran</th>
                                <th class="py-4 px-6 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody" class="divide-y divide-slate-100 text-xs font-semibold text-slate-600">
                            <tr>
                                <td colspan="4" class="py-12 text-center text-slate-400">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Container -->
                <div class="flex justify-between items-center bg-slate-50/20 border-t border-slate-100 px-6 py-4" id="pagination-container">
                    <!-- Dynamic Pagination -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit User Modal -->
    <div id="user-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-md w-full shadow-2xl p-6 md:p-8 animate-in fade-in zoom-in duration-200">
            <!-- Modal Header -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                <h3 class="text-lg font-bold text-slate-800" id="modal-title">Tambah Pengguna</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <!-- Error Alert -->
            <div id="modal-error" class="hidden bg-rose-50 border border-rose-100 text-rose-700 px-4 py-3 rounded-2xl text-xs mb-4"></div>

            <!-- Modal Form -->
            <form id="user-form" class="space-y-4">
                <input type="hidden" id="modal-user-id">
                
                <div>
                    <label for="name" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Nama Lengkap</label>
                    <input type="text" id="name" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="John Doe">
                </div>

                <div>
                    <label for="email" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Alamat Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="nama@museum.id">
                </div>

                <div>
                    <label for="role" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Peran Sistem (Role)</label>
                    <select id="role" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200 text-slate-600">
                        <option value="panitia">Panitia Eksternal</option>
                        <option value="staff">Staf Kurator</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <!-- Password Block (Add Mode only) -->
                <div id="password-block" class="space-y-4">
                    <div>
                        <label for="password" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Kata Sandi</label>
                        <input type="password" id="password" class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Minimal 8 karakter">
                    </div>
                    <div>
                        <label for="password_confirmation" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Konfirmasi Kata Sandi</label>
                        <input type="password" id="password_confirmation" class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Ketik ulang kata sandi">
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="w-1/2 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl text-xs transition-all duration-200">Batal</button>
                    <button type="submit" id="modal-submit-btn" class="w-1/2 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 text-xs transition-all duration-200">Simpan User</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="reset-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-md w-full shadow-2xl p-6 md:p-8 animate-in fade-in zoom-in duration-200">
            <!-- Modal Header -->
            <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                <h3 class="text-lg font-bold text-slate-800">Reset Kata Sandi</h3>
                <button onclick="closeResetModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <!-- Error Alert -->
            <div id="reset-error" class="hidden bg-rose-50 border border-rose-100 text-rose-700 px-4 py-3 rounded-2xl text-xs mb-4"></div>

            <form id="reset-form" class="space-y-4">
                <input type="hidden" id="reset-user-id">
                
                <div>
                    <label for="reset-username" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Pengguna</label>
                    <input type="text" id="reset-username" disabled class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-semibold text-slate-500">
                </div>

                <div>
                    <label for="new_password" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Kata Sandi Baru</label>
                    <input type="password" id="new_password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Minimal 8 karakter">
                </div>

                <div>
                    <label for="new_password_confirmation" class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Konfirmasi Kata Sandi Baru</label>
                    <input type="password" id="new_password_confirmation" required class="w-full px-4 py-3 bg-slate-50 border border-slate-150 rounded-2xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200" placeholder="Ketik ulang kata sandi baru">
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeResetModal()" class="w-1/2 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-2xl text-xs transition-all duration-200">Batal</button>
                    <button type="submit" id="reset-submit-btn" class="w-1/2 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 text-xs transition-all duration-200">Perbarui Sandi</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts Configuration -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        requireAuth(['admin']);
        injectLayout();

        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                fetchUsers(1);
            }, 300);
        }

        async function fetchUsers(page = 1) {
            const search = document.getElementById('search-input').value;
            const role = document.getElementById('role-filter').value;
            const tbody = document.getElementById('users-tbody');
            
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="py-8 text-center text-slate-450 animate-pulse">Memuat data pengguna...</td>
                </tr>
            `;

            try {
                const response = await apiFetch(`/admin/users?page=${page}&search=${search}&role=${role}`);
                if (!response) return;

                const data = await response.json();
                renderUsers(data.data);
                renderPagination(data);
            } catch (error) {
                console.error(error);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('users-tbody');
            const currentUser = checkAuth();

            if (users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="py-12 text-center text-slate-400">
                            <span class="text-3xl">👥</span>
                            <h4 class="text-sm font-bold text-slate-600 mt-2">Daftar Pengguna Kosong</h4>
                            <p class="text-xs text-slate-450 mt-1">Belum ada user yang terdaftar dalam sistem.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = users.map(u => {
                let roleLabel = '';
                let roleColor = '';
                if (u.role === 'admin') {
                    roleLabel = 'Administrator';
                    roleColor = 'bg-rose-50 text-rose-700 border border-rose-100';
                } else if (u.role === 'staff') {
                    roleLabel = 'Staf Kurator';
                    roleColor = 'bg-blue-50 text-blue-700 border border-blue-100';
                } else {
                    roleLabel = 'Panitia Eksternal';
                    roleColor = 'bg-emerald-50 text-emerald-700 border border-emerald-100';
                }

                // Matikan hapus akun sendiri
                const isSelf = currentUser && currentUser.id === u.id;
                const deleteBtnHtml = isSelf 
                    ? `<button disabled class="px-2.5 py-1.5 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-bold cursor-not-allowed">Hapus</button>`
                    : `<button onclick="deleteUser(${u.id})" class="px-2.5 py-1.5 bg-slate-100 hover:bg-rose-50 hover:text-rose-600 text-slate-600 rounded-xl text-[10px] font-bold transition-all duration-200">Hapus</button>`;

                return `
                    <tr class="hover:bg-slate-50/50 transition-all duration-200">
                        <td class="py-4 px-6 font-bold text-slate-800 text-sm">
                            ${u.name} ${isSelf ? '<span class="text-[9px] font-bold text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded-full ml-1.5">Anda</span>' : ''}
                        </td>
                        <td class="py-4 px-6 font-semibold text-slate-700">${u.email}</td>
                        <td class="py-4 px-6 text-center">
                            <span class="text-[9px] font-bold px-2.5 py-1.5 rounded-full ${roleColor}">${roleLabel}</span>
                        </td>
                        <td class="py-4 px-6">
                            <div class="flex gap-1.5 justify-center">
                                <button onclick="openEditModal(${u.id})" class="px-2.5 py-1.5 bg-slate-100 hover:bg-blue-50 hover:text-blue-600 text-slate-600 rounded-xl text-[10px] font-bold transition-all duration-200">Edit</button>
                                <button onclick="openResetModal(${u.id}, '${u.name}')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-amber-50 hover:text-amber-600 text-slate-600 rounded-xl text-[10px] font-bold transition-all duration-200">Reset Sandi</button>
                                ${deleteBtnHtml}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination(data) {
            const container = document.getElementById('pagination-container');
            const total = data.total;
            const from = data.from || 0;
            const to = data.to || 0;
            const currentPage = data.current_page;
            const lastPage = data.last_page;

            let prevBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-450 rounded-xl text-xs font-bold cursor-not-allowed">Sebelumnya</button>`;
            if (currentPage > 1) {
                prevBtn = `<button onclick="fetchUsers(${currentPage - 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Sebelumnya</button>`;
            }

            let nextBtn = `<button disabled class="px-4 py-2 bg-slate-100 text-slate-455 rounded-xl text-xs font-bold cursor-not-allowed">Selanjutnya</button>`;
            if (currentPage < lastPage) {
                nextBtn = `<button onclick="fetchUsers(${currentPage + 1})" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all duration-200">Selanjutnya</button>`;
            }

            container.innerHTML = `
                <span class="text-xs font-semibold text-slate-400">Menampilkan ${from}-${to} dari ${total} user</span>
                <div class="flex gap-2">
                    ${prevBtn}
                    ${nextBtn}
                </div>
            `;
        }

        // Modal Controls (User Add/Edit)
        function openAddModal() {
            document.getElementById('modal-user-id').value = '';
            document.getElementById('modal-title').textContent = 'Tambah Pengguna';
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('password-block').classList.remove('hidden');
            
            document.getElementById('password').required = true;
            document.getElementById('password_confirmation').required = true;

            document.getElementById('user-form').reset();
            document.getElementById('user-modal').classList.remove('hidden');
        }

        async function openEditModal(userId) {
            document.getElementById('modal-error').classList.add('hidden');
            document.getElementById('user-form').reset();
            document.getElementById('password-block').classList.add('hidden');
            
            document.getElementById('password').required = false;
            document.getElementById('password_confirmation').required = false;

            try {
                const response = await apiFetch(`/admin/users/${userId}`);
                if (!response) return;

                const user = await response.json();
                
                document.getElementById('modal-user-id').value = user.id;
                document.getElementById('name').value = user.name;
                document.getElementById('email').value = user.email;
                document.getElementById('role').value = user.role;
                
                document.getElementById('modal-title').textContent = 'Edit Pengguna';
                document.getElementById('user-modal').classList.remove('hidden');

            } catch (error) {
                console.error(error);
            }
        }

        function closeModal() {
            document.getElementById('user-modal').classList.add('hidden');
        }

        // User form submit
        document.getElementById('user-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const userId = document.getElementById('modal-user-id').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            
            const submitBtn = document.getElementById('modal-submit-btn');
            const errorAlert = document.getElementById('modal-error');

            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Menyimpan...';

            let endpoint = '/admin/users';
            let options = {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name, email, role,
                    password: document.getElementById('password').value,
                    password_confirmation: document.getElementById('password_confirmation').value
                })
            };

            if (userId) {
                endpoint = `/admin/users/${userId}`;
                options.method = 'PUT';
                options.body = JSON.stringify({ name, email, role });
            }

            try {
                const response = await apiFetch(endpoint, options);
                if (!response) return;

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Gagal menyimpan user.');
                }

                alert(data.message || 'User berhasil disimpan!');
                closeModal();
                fetchUsers(1);

            } catch (error) {
                errorAlert.textContent = error.message;
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Simpan User';
            }
        });

        // Reset Password Modal
        function openResetModal(userId, userName) {
            document.getElementById('reset-user-id').value = userId;
            document.getElementById('reset-username').value = userName;
            document.getElementById('reset-error').classList.add('hidden');
            document.getElementById('reset-form').reset();
            document.getElementById('reset-modal').classList.remove('hidden');
        }

        function closeResetModal() {
            document.getElementById('reset-modal').classList.add('hidden');
        }

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const userId = document.getElementById('reset-user-id').value;
            const password = document.getElementById('new_password').value;
            const passwordConfirmation = document.getElementById('new_password_confirmation').value;
            
            const submitBtn = document.getElementById('reset-submit-btn');
            const errorAlert = document.getElementById('reset-error');

            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Memproses...';

            try {
                const response = await apiFetch(`/admin/users/${userId}/reset-password`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password,
                        password_confirmation: passwordConfirmation
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Gagal mereset password.');
                }

                alert(data.message || 'Password berhasil diperbarui!');
                closeResetModal();

            } catch (error) {
                errorAlert.textContent = error.message;
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Perbarui Sandi';
            }
        });

        // Delete User
        async function deleteUser(userId) {
            if (!confirm('Apakah Anda yakin ingin menghapus pengguna ini? Semua data relasi pengajuannya akan terdampak.')) {
                return;
            }

            try {
                const response = await apiFetch(`/admin/users/${userId}`, {
                    method: 'DELETE'
                });

                if (!response) return;
                const data = await response.json();
                
                alert(data.message || 'Pengguna berhasil dihapus!');
                fetchUsers(1);
            } catch (error) {
                console.error(error);
            }
        }

        // Initial Load
        fetchUsers(1);
    </script>
</body>
</html>
