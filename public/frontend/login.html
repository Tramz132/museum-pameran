<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MUSEUMEXPO</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>
<body class="text-slate-900 antialiased min-h-screen flex flex-col items-center justify-center p-4"
      style="background-image: linear-gradient(rgba(15, 23, 42, 0.25), rgba(15, 23, 42, 0.35)), url('http://127.0.0.1:8000/images/museum_bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
    
    <div class="w-full max-w-md">
        <!-- Main Card Wrapper (Dark Glassmorphism) -->
        <div class="bg-slate-950/45 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-10 transition-all duration-300">
            
            <!-- Brand Tag -->
            <div class="text-center mb-6">
                <span class="text-3xl font-black tracking-widest text-white uppercase">MUSEUM<span class="text-blue-400">EXPO</span></span>
            </div>

            <!-- Page Title -->
            <h2 class="text-3xl font-black text-center text-white mb-8 tracking-wide">Login</h2>

            <!-- Alert Error Container -->
            <div id="error-alert" class="hidden bg-rose-500/20 border border-rose-500/30 text-rose-200 px-4 py-3 rounded-2xl text-xs mb-6"></div>

            <!-- Login Form -->
            <form id="login-form">
                <!-- Email Input (Underline Style) -->
                <div class="relative border-b border-white/30 py-1.5 focus-within:border-white transition-colors duration-200 mb-6">
                    <label for="email" class="block text-xs font-semibold text-slate-300">Email</label>
                    <div class="flex items-center justify-between mt-1">
                        <input type="email" id="email" required
                               class="w-full bg-transparent text-white placeholder-white/30 border-none outline-none focus:ring-0 text-sm py-1 pr-8" 
                               placeholder="nama@museum.id">
                        <span class="absolute right-2 text-white/60">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
                        </span>
                    </div>
                </div>

                <!-- Password Input (Underline Style) -->
                <div class="relative border-b border-white/30 py-1.5 focus-within:border-white transition-colors duration-200 mb-6">
                    <label for="password" class="block text-xs font-semibold text-slate-300">Password</label>
                    <div class="flex items-center justify-between mt-1">
                        <input type="password" id="password" required
                               class="w-full bg-transparent text-white placeholder-white/30 border-none outline-none focus:ring-0 text-sm py-1 pr-8" 
                               placeholder="••••••••">
                        <span class="absolute right-2 text-white/60">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                        </span>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between text-xs text-slate-350 mb-8 font-medium">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="remember" class="rounded bg-white/10 border-white/20 text-blue-500 focus:ring-0 w-4 h-4">
                        <span>Remember me</span>
                    </label>
                    <a href="#" onclick="alert('Silakan hubungi administrator untuk mereset kata sandi Anda.')" class="hover:underline text-white">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit" id="submit-btn"
                            class="w-full py-3.5 bg-slate-900 hover:bg-black active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all duration-200 text-sm tracking-wide">
                        Login
                    </button>
                </div>
            </form>

            <!-- Card Footer Description -->
            <div class="text-center text-[10px] text-slate-400 mt-6 font-semibold tracking-wider uppercase">
                Sistem Manajemen Pameran Museum
            </div>

        </div>
    </div>

    <!-- Scripts Configuration & Login Handler -->
    <script src="js/config.js"></script>
    <script>
        // Cek jika sudah login, redirect langsung
        const token = localStorage.getItem('access_token');
        const userJson = localStorage.getItem('user');
        if (token && userJson) {
            const user = JSON.parse(userJson);
            if (user.role === 'admin') window.location.href = '/frontend/admin/dashboard.html';
            else if (user.role === 'staff') window.location.href = '/frontend/staff/dashboard.html';
            else if (user.role === 'panitia') window.location.href = '/frontend/panitia/dashboard.html';
        }

        // Handle Login Submit
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('error-alert');
            const submitBtn = document.getElementById('submit-btn');

            errorAlert.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Memverifikasi...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Kredensial salah.');
                }

                // Simpan token dan info user ke localStorage
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Arahkan ke dashboard masing-masing
                if (data.user.role === 'admin') {
                    window.location.href = '/frontend/admin/dashboard.html';
                } else if (data.user.role === 'staff') {
                    window.location.href = '/frontend/staff/dashboard.html';
                } else if (data.user.role === 'panitia') {
                    window.location.href = '/frontend/panitia/dashboard.html';
                }

            } catch (error) {
                errorAlert.textContent = error.message;
                errorAlert.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Masuk Sekarang';
            }
        });
    </script>
</body>
</html>
